name: Release

on:
  push:
    branches: [master]

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Determine version bump, update files, commit and tag
  # ─────────────────────────────────────────────────────────────────────────────
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    # Skip if this is the version-bump commit itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      old_version: ${{ steps.version.outputs.old_version }}
      should_release: ${{ steps.version.outputs.should_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT if you need to push to a protected branch.
          # Otherwise GITHUB_TOKEN works for unprotected branches.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine version bump
        id: version
        run: node scripts/determine-version.js

      - name: Update version, README and CHANGELOG
        if: steps.version.outputs.should_release == 'true'
        run: node scripts/update-version.js ${{ steps.version.outputs.new_version }} ${{ steps.version.outputs.old_version }}

      - name: Commit, tag and push
        if: steps.version.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json README.md CHANGELOG.md
          git commit -m "chore(release): v${{ steps.version.outputs.new_version }} [skip ci]"
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin master
          git push origin "v${{ steps.version.outputs.new_version }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Build macOS (arm64 + x64 DMG)
  # ─────────────────────────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (updated master)
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app bundle
        run: npm run build

      - name: Package for macOS
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-artifacts
          path: releases/*.dmg
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Build Windows (NSIS installer + portable EXE)
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (updated master)
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app bundle
        run: npm run build

      - name: Package for Windows
        run: npm run dist

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: releases/*.exe
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Build Linux (AppImage + DEB)
  # ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (updated master)
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libxtst6 \
            xauth \
            xvfb \
            libgbm-dev \
            libxkbcommon-x11-0

      - name: Install dependencies
        run: npm ci

      - name: Build app bundle
        run: npm run build

      - name: Package for Linux
        run: npm run dist

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            releases/*.AppImage
            releases/*.deb
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Create GitHub Release with all artifacts
  # ─────────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [prepare-release, build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract changelog entry for this release
        id: changelog
        run: |
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('CHANGELOG.md', 'utf8');
            // Extract the first release section (between ## [version] and next --- or ## [)
            const match = content.match(/## \[[^\]]+\][\s\S]+?(?=\n---)/);
            const body = match ? match[0].trim() : 'See CHANGELOG.md for details.';
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'body<<RELEASE_EOF\n' + body + '\nRELEASE_EOF\n');
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare-release.outputs.new_version }}
          name: v${{ needs.prepare-release.outputs.new_version }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          files: |
            artifacts/mac-artifacts/*
            artifacts/windows-artifacts/*
            artifacts/linux-artifacts/*
