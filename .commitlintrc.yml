extends:
  - '@commitlint/config-conventional'

rules:
  # Allow longer commit body lines (useful for detailed descriptions)
  body-max-line-length: [0]
  # Allow longer header lines
  header-max-length: [1, always, 100]

# Version bump rules:
#   fix:    → patch bump  (2.0.0 → 2.0.1)
#   feat:   → minor bump  (2.0.0 → 2.1.0)
#   feat!:  → major bump  (2.0.0 → 3.0.0)
#   BREAKING CHANGE in footer → major bump
#   chore/docs/style/refactor/test/ci → no release
